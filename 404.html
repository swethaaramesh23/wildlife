<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost In The Wild | Stackly Premium</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(135deg, rgba(5,5,5,0.7) 0%, rgba(5,5,5,0.95) 100%), url('image/lion.webp');
            background-size: cover;
            background-position: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        
        .error-content {
            padding: 60px 50px;
            border-radius: 16px;
            backdrop-filter: var(--glass-blur);
            background: rgba(15, 15, 18, 0.6);
            border: 1px solid var(--glass-border);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            max-width: 600px;
            position: relative;
            z-index: 2;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .error-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .error-code {
            font-family: var(--font-heading);
            font-size: clamp(6rem, 12vw, 10rem);
            color: transparent;
            -webkit-text-stroke: 1px var(--accent-gold);
            line-height: 1;
            margin-bottom: 10px;
            position: relative;
        }

        .error-code::after {
            content: '404';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: var(--accent-gold);
            filter: blur(15px);
            opacity: 0.3;
            z-index: -1;
        }
        
        .error-title {
            font-family: var(--font-heading);
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 20px;
            color: var(--text-main);
            letter-spacing: 2px;
        }
        
        .error-desc {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
            line-height: 1.6;
            padding: 0 20px;
        }
        
        .error-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        @media (max-width: 576px) {
            .error-content { padding: 40px 20px; margin: 20px; }
            .error-actions { flex-direction: column; }
        }
    </style>
</head>
<body class="error-page">
    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="error-content">
        <div class="error-code">404</div>
        <h1 class="error-title">Lost In The Wild?</h1>
        <p class="error-desc">It seems the trail you're following has gone cold. The coordinate you are looking for has migrated or no longer exists.</p>
        
        <div class="error-actions">
            <a href="index.html" class="btn btn-primary hover-target">Return to Basecamp</a>
            <a href="gallery.html" class="btn btn-outline hover-target">Explore Gallery</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>
</html>
