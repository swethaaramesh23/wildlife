<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost In The Wild | Stackly Premium</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(135deg, rgba(5,5,5,0.7) 0%, rgba(5,5,5,0.95) 100%), url('image/lion.webp');
            background-size: cover;
            background-position: center;
            text-align: center;
            position: relative;
            padding: 120px 20px 40px; /* Prevents overlap with fixed navbar */
        }
        
        .error-content {
            padding: 50px 40px;
            border-radius: 16px;
            backdrop-filter: var(--glass-blur);
            background: rgba(15, 15, 18, 0.6);
            border: 1px solid var(--glass-border);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 2;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin: auto;
        }

        .error-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .error-code {
            font-family: var(--font-heading);
            font-size: clamp(4rem, 12vw, 6rem);
            color: transparent;
            -webkit-text-stroke: 1px var(--accent-gold);
            line-height: 1;
            margin-bottom: 20px;
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        .error-code::after {
            content: '404';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: var(--accent-gold);
            filter: blur(15px);
            opacity: 0.3;
            z-index: -1;
        }
        
        .error-title {
            font-family: var(--font-heading);
            font-size: clamp(1.5rem, 4vw, 2rem);
            margin-bottom: 25px;
            color: var(--text-main);
            letter-spacing: 2px;
            animation: fadeInScale 0.8s ease-out 0.4s both;
        }
        
        .error-desc {
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 1rem;
            line-height: 1.8;
            padding: 0 10px;
            text-align: center !important;
            animation: fadeInScale 0.8s ease-out 0.6s both;
        }
        
        .error-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            animation: fadeInScale 0.8s ease-out 0.8s both;
        }

        @media (max-width: 576px) {
            .error-content { padding: 40px 20px; margin: 0 auto; }
            .error-actions { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body class="error-page">
    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <img src="stackly-logo.webp" alt="Stackly Logo">
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="expeditions.html">Expeditions</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <button class="mobile-toggle">☰</button>
    </nav>

    <div class="error-content">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">It seems the trail you're following has gone cold. The coordinate you are looking for has migrated or no longer exists.</p>
        
        <div class="error-actions">
            <a href="index.html" class="btn btn-primary hover-target">Back to Home</a>
            <a href="contact.html" class="btn btn-outline hover-target">Contact Us</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>
</html>
