<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stackly Premium Wildlife Photography</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <img src="stackly-logo.webp" alt="Stackly Logo">
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="expeditions.html">Expeditions</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <!-- empty for login page, or we could leave it out -->
        </div>
        <button class="mobile-toggle">☰</button>
    </nav>

    <div class="auth-split">
        <!-- Image Side -->
        <div class="auth-image" style="background-image: url('image/lion.webp');"></div>
        
        <!-- Form Side -->
        <div class="auth-form-side">
            <div class="auth-container">
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Enter your credentials to access your collection.</p>
                </div>
                
                <form action="dashboard.html" class="auth-form">
                    
                    <div class="form-group role-selector">
                        <label class="group-label">Sign in as</label>
                        <div class="role-options">
                            <label class="role-label">
                                <input type="radio" name="role" value="client" checked>
                                <span class="role-btn hover-target">Collector / Client</span>
                            </label>
                            <label class="role-label">
                                <input type="radio" name="role" value="photographer">
                                <span class="role-btn hover-target">Artist / Admin</span>
                            </label>
                        </div>
                    </div>

                    <div class="input-group">
                        <input type="email" id="email" required autocomplete="email">
                        <label for="email">Email Address</label>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" id="password" required autocomplete="current-password">
                        <label for="password">Password</label>
                    </div>
                    
                    <div class="auth-actions">
                        <label class="remember-me hover-target">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="404.html" class="forgot-pwd hover-target">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full hover-target">Sign In to Portfolio</button>
                </form>
                
                <div class="auth-footer">
                    <p>Don't have an account? <a href="signup.html" class="hover-target">Apply for access</a></p>
                    <div style="margin-top: 30px;">
                        <a href="index.html" class="hover-target" style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">&larr; Return to Gallery</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
