<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Stackly Premium Wildlife Photography</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <img src="stackly-logo.webp" alt="Stackly Logo">
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="expeditions.html">Expeditions</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <a href="login.html" class="btn btn-outline hover-target">Login</a>
        </div>
        <button class="mobile-toggle">☰</button>
    </nav>

    <div class="auth-split">
        <!-- Form Side -->
        <div class="auth-form-side">
            <div class="auth-container">
                <div class="auth-header">
                    <h2>Exclusive Access</h2>
                    <p>Apply for an account to acquire limited edition prints and book private expeditions.</p>
                </div>
                
                <form action="dashboard.html" class="auth-form">
                    
                    <div class="form-row">
                        <div class="input-group">
                            <input type="text" id="fname" required autocomplete="given-name">
                            <label for="fname">First Name</label>
                        </div>
                        <div class="input-group">
                            <input type="text" id="lname" required autocomplete="family-name">
                            <label for="lname">Last Name</label>
                        </div>
                    </div>

                    <div class="input-group">
                        <input type="email" id="email" required autocomplete="email">
                        <label for="email">Email Address</label>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" id="password" required autocomplete="new-password">
                        <label for="password">Create Password</label>
                    </div>

                    <div class="pwd-strength-container">
                        <div class="pwd-strength-bar">
                            <div class="pwd-strength-fill"></div>
                        </div>
                        <div class="pwd-strength-text">Password Strength</div>
                    </div>

                    <div class="input-group">
                        <input type="password" id="confirm_password" required autocomplete="new-password">
                        <label for="confirm_password">Confirm Password</label>
                    </div>
                    
                    <div class="auth-actions" style="margin-bottom: 30px;">
                        <label class="remember-me hover-target" style="font-size: 0.9rem;">
                            <input type="checkbox" required> I agree to the <a href="404.html" style="color:var(--accent-gold); text-decoration:none;">Terms of Service</a> & <a href="404.html" style="color:var(--accent-gold); text-decoration:none;">Privacy Policy</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full hover-target">Submit Application</button>
                </form>
                
                <div class="auth-footer">
                    <p>Already a collector? <a href="login.html" class="hover-target">Sign in here</a></p>
                    <div style="margin-top: 30px;">
                        <a href="index.html" class="hover-target" style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">&larr; Return to Gallery</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
